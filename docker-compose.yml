services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: workforce
      POSTGRES_PASSWORD: dev_only
      POSTGRES_DB: workforce_ai
    # No host port published: backend reaches this over the compose network
    # as `db:5432`, and publishing 5432 would collide with a local Postgres
    # already running on the host (common for this project's own dev setup).
    # Add your own `ports: ["5432:5432"]` override if you want host psql access.
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workforce -d workforce_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./src/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://workforce:dev_only@db:5432/workforce_ai
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build: ./src/frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
