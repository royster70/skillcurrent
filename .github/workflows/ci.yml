name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Quality gate (black + ruff + mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pre-commit envs
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  redistribution-gate:
    name: Redistribution gate (FR-9.5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Stdlib-only, no DB needed — validates data/signal_sources/*.csv directly.
      - run: cd src/backend && python -m scripts.check_redistribution

  secret-scan:
    name: Secret scan (history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — this scans every commit
      # Automates the PUBLISHING.md section-0 pre-publish scan so it can't be
      # forgotten before a push to a public repo.
      - name: No .env / Data ever committed
        run: |
          if git log --all --oneline -- '.env' '**/.env' 'Data/**' | grep -q .; then
            echo "::error::.env or Data/ appears in git history"; exit 1
          fi
          echo "OK: no .env/Data in history"
      - name: No credential values in history
        run: |
          hits=$(git rev-list --all | while read c; do \
            git grep -IE "sk-ant-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|(ANTHROPIC_AUTH_TOKEN|API_KEY|SECRET)[[:space:]]*=[[:space:]]*[\"']?[A-Za-z0-9]{24,}" "$c" -- 2>/dev/null; \
          done | head -5)
          if [ -n "$hits" ]; then echo "::error::potential credential in history:"; echo "$hits"; exit 1; fi
          echo "CLEAN"

  backend-tests:
    name: Backend tests (non-DB subset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/backend/pyproject.toml
      - run: cd src/backend && pip install -e ".[dev]"
      # test_drift.py and test_onet_ingestion.py are the DB-free suites (pure
      # functions / tmp_path). The rest need a live seeded Postgres via
      # tests/conftest.py; a follow-up can add a Postgres service + restore_seed
      # now that the seed exists (release-1.0-backlog.md P2 shipped).
      - run: cd src/backend && pytest tests/test_drift.py tests/test_onet_ingestion.py -v

  frontend:
    name: Frontend (lint + typecheck + unit tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - run: cd src/frontend && npm ci
      - run: cd src/frontend && npm run lint
      - run: cd src/frontend && npm run typecheck
      - run: cd src/frontend && npm run test
      - run: cd src/frontend && npm run build
