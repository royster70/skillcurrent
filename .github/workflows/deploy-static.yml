name: Deploy static site

# Builds the no-database static build (P4) and deploys it to GitHub Pages.
# Manual (workflow_dispatch) or on a version tag. The data tree is generated
# fresh from the committed seed — no external data downloads.
on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: workforce
          POSTGRES_PASSWORD: dev_only
          POSTGRES_DB: workforce_ai
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U workforce -d workforce_ai"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://workforce:dev_only@localhost:5432/workforce_ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/backend/pyproject.toml
      - name: Install backend
        run: cd src/backend && pip install -e .

      - name: Migrate + restore seed
        run: |
          cd src/backend
          python -m alembic upgrade head
          python -m scripts.restore_seed

      - name: Build static data tree
        run: cd src/backend && python -m scripts.build_static_site

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Build frontend (cdn mode)
        env:
          VITE_DEPLOYMENT_MODE: cdn
          # Project Pages sites serve under /<repo>/.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          cd src/frontend
          npm ci
          npm run build
          # SPA fallback: GitHub Pages serves 404.html for unknown paths, which
          # boots the app so BrowserRouter deep links resolve (clean URLs kept).
          cp dist/index.html dist/404.html
          # Skip Jekyll (the data tree has files Jekyll would ignore).
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: src/frontend/dist
      - id: deploy
        uses: actions/deploy-pages@v4
