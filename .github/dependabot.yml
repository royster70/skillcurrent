version: 2
updates:
  - package-ecosystem: pip
    directory: /src/backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /src/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
