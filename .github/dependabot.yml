version: 2

# Grouping rule (both ecosystems): minor + patch bumps batch into one PR;
# MAJOR bumps come as individual PRs. A major is where breaking changes live
# (e.g. a TypeScript or ruff major), so reviewing them one at a time means a
# single incompatible bump can't taint — and block — the whole batch.
updates:
  - package-ecosystem: pip
    directory: /src/backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # black and ruff are pinned in lockstep with .pre-commit-config.yaml: the
    # pyproject [dev] pin MUST equal the hook rev, or `python -m black` diverges
    # from the commit gate. Never auto-bump them in isolation — do it deliberately,
    # updating the pre-commit revs in the same change. (Bumping only pyproject
    # passes CI misleadingly, because pre-commit runs its own pinned revs.)
    ignore:
      - dependency-name: black
      - dependency-name: ruff
    groups:
      backend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /src/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
