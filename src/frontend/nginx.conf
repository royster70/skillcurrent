# Mirrors vite.config.ts's dev proxy (/api -> backend:8000) so
# src/lib/api.ts's relative fetch('/api/v1/...') calls need no changes
# between `npm run dev` and the Docker build.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router (BrowserRouter) — serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
