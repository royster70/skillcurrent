repos:
  # FORMATTER POLICY: black is the SOLE formatter. ruff runs as linter only (never re-add ruff-format —
  # black and ruff-format are separate implementations and diverge on edge cases, e.g. multiline-string
  # call args, causing commit oscillation; see the 2026-07 toolchain PR). Keep line-length=100 + target
  # py312 in lockstep across [tool.black], [tool.ruff] (src/backend/pyproject.toml) and root ruff.toml,
  # and keep the [dev] black/ruff pins == these hook revs so local == CI.
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.12
        args: ["--line-length=100"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ["--strict", "--python-version=3.12", "--config-file=src/backend/pyproject.toml"]
        additional_dependencies:
          - "sqlalchemy[mypy]"
          - "pydantic"
          - "pydantic-settings"
          - "fastapi"
        files: ^src/backend/app/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: local
    hooks:
      - id: docs-reachability
        name: docs reachability (broken links + orphaned docs)
        entry: python scripts/check_docs.py
        language: system
        files: \.md$
        pass_filenames: false
