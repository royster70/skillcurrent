# Repo-root ruff config for Python that lives ABOVE src/backend/ (scripts/*, tooling).
# Without this, ruff-format resolves no config for root-level files and falls back to its
# default line-length of 88, while the black pre-commit hook uses --line-length=100 — the
# two then fight over every 89–100 char line. Pinning 100 here keeps them in agreement.
# src/backend/ has its own pyproject.toml [tool.ruff]; this only governs files outside it.
line-length = 100
target-version = "py312"

[lint]
# black owns line length (sole formatter) — don't double-check it in the linter.
ignore = ["E501"]

[lint.per-file-ignores]
# Procedural CLI scripts (e.g. the docs-reachability checker) are exempt from
# C901 complexity — that limit is for application logic, not one-shot tooling.
"scripts/**" = ["C901"]
